package: d2u_news
version: '1.2.0'
author: Tobias Krais
supportpage: http://github.com/tobiaskrais/d2u_news

page:
    title: 'translate:d2u_news'
    perm: 'd2u_news[]'
    icon: rex-icon fa-newspaper-o
    subpages:
        news: { title: 'translate:d2u_news_news_title', icon: rex-icon fa-newspaper-o }
        categories: { title: 'translate:d2u_helper_categories', icon: rex-icon rex-icon-open-category }
        news_types: { title: 'translate:d2u_news_types', icon: rex-icon fa-file-text-o, perm: 'd2u_news[edit_data]' }
        fairs: { title: 'translate:d2u_news_fairs', icon: rex-icon fa-university, perm: 'd2u_news[edit_data]' }
        settings:
            icon: rex-icon rex-icon-system
            title: ''
            itemClass: pull-right
            subpages:
                settings: { title: 'translate:d2u_helper_settings', icon: rex-icon rex-icon-system, perm: 'd2u_news[settings]' }
                setup: { title: 'translate:d2u_helper_setup', icon: rex-icon rex-icon-install, perm: 'd2u_news[settings]' }
        help:
            title: ''
            icon: rex-icon rex-icon-help
            itemClass: pull-right
            subpages:
                changelog: { title: 'translate:d2u_helper_help_chapter_changelog' }

requires:
    php: '>=8.0'
    redaxo: '>=5.10.0'
    packages:
        d2u_helper: '>=2.2.1'
        sprog: '>=1.0.0'

conflicts:
    packages:
        d2u_courses: '<3.5.0'
        d2u_machinery: '<1.6.0'

default_config:
    default_sort: 'name'

installer_ignore:
    - .github